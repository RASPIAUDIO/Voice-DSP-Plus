<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" role="img" aria-labelledby="title desc">
  <title id="title">Voice DSP+ SQUARE microphone layout</title>
  <desc id="desc">Top view with USB on the left. Microphones D1, D2, D3 and D0 are arranged clockwise from the upper-left corner.</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0 0L8 4L0 8Z" fill="#d66b35"/>
    </marker>
  </defs>
  <rect width="760" height="480" rx="28" fill="#fff8eb"/>
  <text x="38" y="48" font-family="Verdana, sans-serif" font-size="27" font-weight="700" fill="#12252b">SQUARE - 360-degree listening</text>
  <text x="38" y="78" font-family="Verdana, sans-serif" font-size="15" fill="#52636a">Top view. USB connector is on the left.</text>
  <circle cx="424" cy="267" r="160" fill="none" stroke="#d66b35" stroke-width="4" stroke-dasharray="10 11"/>
  <path d="M424 107A160 160 0 0 1 584 267" fill="none" stroke="#d66b35" stroke-width="4" marker-end="url(#arrow)"/>
  <rect x="220" y="120" width="410" height="290" rx="30" fill="#1e5158" stroke="#12252b" stroke-width="5"/>
  <rect x="176" y="222" width="58" height="92" rx="11" fill="#d7dfe0" stroke="#12252b" stroke-width="4"/>
  <text x="147" y="210" font-family="Verdana, sans-serif" font-size="15" font-weight="700" fill="#12252b">USB</text>
  <rect x="330" y="198" width="190" height="135" rx="18" fill="#f1c981" opacity="0.96"/>
  <text x="425" y="255" text-anchor="middle" font-family="Verdana, sans-serif" font-size="20" font-weight="700" fill="#12252b">Voice DSP+</text>
  <text x="425" y="283" text-anchor="middle" font-family="Verdana, sans-serif" font-size="14" fill="#33464d">voices may come</text>
  <text x="425" y="304" text-anchor="middle" font-family="Verdana, sans-serif" font-size="14" fill="#33464d">from any side</text>
  <g font-family="Verdana, sans-serif" text-anchor="middle">
    <circle cx="270" cy="162" r="25" fill="#fff" stroke="#d66b35" stroke-width="6"/>
    <text x="270" y="168" font-size="17" font-weight="700" fill="#12252b">D1</text>
    <circle cx="580" cy="162" r="25" fill="#fff" stroke="#d66b35" stroke-width="6"/>
    <text x="580" y="168" font-size="17" font-weight="700" fill="#12252b">D2</text>
    <circle cx="580" cy="368" r="25" fill="#fff" stroke="#d66b35" stroke-width="6"/>
    <text x="580" y="374" font-size="17" font-weight="700" fill="#12252b">D3</text>
    <circle cx="270" cy="368" r="25" fill="#fff" stroke="#d66b35" stroke-width="6"/>
    <text x="270" y="374" font-size="17" font-weight="700" fill="#12252b">D0</text>
  </g>
  <rect x="38" y="409" width="190" height="39" rx="19" fill="#5b8f70"/>
  <text x="133" y="434" text-anchor="middle" font-family="Verdana, sans-serif" font-size="13" font-weight="700" fill="#fff">P6 = 1 / green LED</text>
  <text x="424" y="459" text-anchor="middle" font-family="Verdana, sans-serif" font-size="14" fill="#52636a">Recommended for tabletop assistants, rooms, robots and 360-degree DoA.</text>
</svg>
